name: Deploy to DirectAdmin

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Genereer mail-config.php
        run: |
          cat > formulier/mail-config.php <<PHP
          <?php
          return [
              'smtp_host' => '${{ secrets.SMTP_HOST }}',
              'smtp_port' => ${{ secrets.SMTP_PORT }},
              'smtp_username' => '${{ secrets.SMTP_USERNAME }}',
              'smtp_password' => '${{ secrets.SMTP_PASSWORD }}',
              'from_email' => '${{ secrets.SMTP_USERNAME }}',
              'from_name' => 'NextGen AI website',
              'owner_email' => 'bastiaan@mrbluesky.nl',
              'site_url' => 'https://nextgen.origyns.nl',
          ];
          PHP

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          server-dir: /domains/origyns.nl/public_html/nextgen/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
